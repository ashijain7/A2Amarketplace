# BIRD text-to-SQL benchmark configuration.

# Chain to the BIRD execution-based resource server + agent config.
config_paths:
  - resources_servers/bird_sql/configs/bird_sql.yaml

# Inherit-from directives isolate this benchmark config from the generic server config.
birdbench_bird_sql_resources_server:
  _inherit_from: bird_sql_resources_server

birdbench_bird_sql_simple_agent:
  _inherit_from: bird_sql_simple_agent
  responses_api_agents:
    simple_agent:
      resources_server:
        name: birdbench_bird_sql_resources_server
      datasets:
        - name: birdbench
          type: benchmark
          jsonl_fpath: benchmarks/birdbench/data/birdbench_benchmark.jsonl
          prompt_config: benchmarks/birdbench/prompts/default.yaml
          prepare_script: benchmarks/birdbench/prepare.py
          num_repeats: 16
