nvarc_inductive_resources_server:
  resources_servers:
    nvarc:
      entrypoint: app.py
      domain: knowledge
      verified: false
      description: "ARC-AGI inductive mode: model outputs Python code with transform()"
      value: Improve ARC-AGI puzzle-solving by inducing executable transformation programs
      agent_mode: inductive
      python_timeout_seconds: 30

nvarc_inductive_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: nvarc_inductive_resources_server
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
        - name: example
          type: example
          jsonl_fpath: resources_servers/nvarc/data/example.jsonl
        - name: train
          type: train
          jsonl_fpath: resources_servers/nvarc/data/python_inductive/train.jsonl
          license: Apache 2.0
        - name: validation
          type: validation
          jsonl_fpath: resources_servers/nvarc/data/python_inductive/validation.jsonl
          license: Apache 2.0
