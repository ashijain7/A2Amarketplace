grl_tetris:
  resources_servers:
    grl_tetris:
      entrypoint: app.py
      domain: games
      verified: false
      description: Tetris in Gymnasium API style. Model emits one or more moves per turn.
      value: Multi-step Tetris environment
grl_tetris_gymnasium_agent:
  responses_api_agents:
    gymnasium_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: grl_tetris
      model_server:
        type: responses_api_models
        name: policy_model
      max_steps: 20
      datasets:
      - name: example
        type: example
        jsonl_fpath: resources_servers/grl_tetris/data/example.jsonl
        num_repeats: 1
        license: Apache 2.0
